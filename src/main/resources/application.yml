spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/job_scheduler
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  quartz:
    job-store-type: memory

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui/
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.scheduler: DEBUG
    org.springframework.web: INFO
    org.quartz: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
